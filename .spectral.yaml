extends:
  - https://raw.githubusercontent.com/aep-dev/aep-openapi-linter/main/spectral.yaml

# Disable AEP collection/pagination rules since /health is not a collection endpoint
# Note: /applications already implements pagination correctly, so disabling these
# linter rules won't affect its proper behavior
rules:
  aep-158-max-page-size-parameter: off
  aep-158-page-token-parameter: off
  aep-132-operation-id: warn
  aep-158-response-array-property: off
  aep-158-response-next-page-token-property: off